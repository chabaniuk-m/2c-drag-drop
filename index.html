<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="icon" type="image/png" href="check.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <h1>Task Manager</h1>

        <form id="new-task-form" class="task-form">
            <input type="text" id="new-task-input" placeholder="Add a new task and press Enter" autocomplete="off" required>
        </form>

        <div id="notification" class="notification"></div>

        <div class="board">
            <div class="list" id="todo-list">
                <h3>To Do</h3>
                <div class="card" id="card-1">
                    <span class="handle">⋮⋮</span> Write project proposal
                </div>
                <div class="card" id="card-2">
                    <span class="handle">⋮⋮</span> Schedule team meeting
                </div>
            </div>

            <div class="list" id="inprogress-list">
                <h3>In Progress</h3>
            </div>

            <div class="list" id="done-list">
                <h3>Done</h3>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
